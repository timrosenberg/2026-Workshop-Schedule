<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="page-type" content="faculty" />
  <meta name="theme-color" content="#404040" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#333333" media="(prefers-color-scheme: dark)">
  <title>Room Guide – Saxophone Workshop 2026</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="faculty.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/faculty-icon-180.png">
  <style>
    html { background-color: #404040; }
    @media (prefers-color-scheme: dark) { html { background-color: #333333; } }
    :root {
      --forest:      #404040;
      --forest-deep: #252525;
      --forest-mid:  #5A5A5A;
      --forest-lt:   #888888;
      --forest-pale: #E4E4E4;
    }
    body.dark { --forest-pale: #202020; }

    .personal-nav {
      display: flex;
      gap: 1rem;
      padding: 0.55rem 16px;
      font-size: 0.85em;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 48px;
      z-index: 90;
    }
    .personal-nav a { color: var(--text2); text-decoration: none; }
    .personal-nav a:hover { color: var(--text); text-decoration: underline; }
  </style>
</head>
<body>

<div class="app">

  <header class="header">
    <div class="wordmark">
      <div class="wm-name">Room Guide</div>
    </div>
    <div class="hbtns">
      <button class="hbtn" id="darkBtn" title="Toggle dark mode"></button>
    </div>
  </header>

  <div class="personal-nav">
    <a href="schedule.html">← My Schedule</a>
    <a href="index.html">Dashboard</a>
  </div>

  <main class="main">
    <div id="room-list-container" class="sched" style="padding: 0.5rem 0 2rem;"></div>
  </main>


</div>

<script src="nav.js"></script>
<script src="/js/script.js" defer></script>
</body>
</html>
