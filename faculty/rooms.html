<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="page-type" content="faculty" />
  <meta name="theme-color" content="#404040" />
  <title>Room Guide – Saxophone Workshop 2026</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="faculty.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/faculty-icon-180.png">
  <style>
    :root {
      --forest:      #404040;
      --forest-deep: #252525;
      --forest-mid:  #5A5A5A;
      --forest-lt:   #888888;
      --forest-pale: #E4E4E4;
    }
    body.dark { --forest-pale: #202020; }

    .personal-nav {
      display: flex;
      gap: 1rem;
      padding: 0.55rem 16px;
      font-size: 0.85em;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 48px;
      z-index: 90;
    }
    .personal-nav a { color: var(--text2); text-decoration: none; }
    .personal-nav a:hover { color: var(--text); text-decoration: underline; }
  </style>
</head>
<body>

<div class="app">

  <header class="header">
    <div class="wordmark">
      <div class="wm-name">Room Guide</div>
    </div>
    <div class="hbtns">
      <button class="hbtn" id="darkBtn" title="Toggle dark mode"></button>
    </div>
  </header>

  <div class="personal-nav">
    <a href="schedule.html">← My Schedule</a>
    <a href="index.html">Dashboard</a>
  </div>

  <main class="main">
    <div id="room-list-container" class="sched" style="padding: 0.5rem 0 2rem;"></div>
  </main>

  <nav class="bottom-nav">
    <a href="schedule.html" class="nav-item">
      <svg class="icon" viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M4 11h16"/><path d="M11 15h1"/><path d="M12 15v3"/></svg>
      <span class="nav-lbl">My Schedule</span>
    </a>
    <a href="rooms.html" class="nav-item active">
      <svg class="icon" viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 12v.01"/><path d="M3 21h18"/><path d="M6 21v-16a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v16"/></svg>
      <span class="nav-lbl">Rooms</span>
    </a>
    <a href="students.html" class="nav-item">
      <svg class="icon" viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0"/><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"/></svg>
      <span class="nav-lbl">Students</span>
    </a>
  </nav>

</div>

<script>
  const _slug = localStorage.getItem('faculty-slug');
  if (_slug) {
    document.querySelectorAll('a[href="schedule.html"]').forEach(a => {
      a.href = `schedule.html?name=${encodeURIComponent(_slug)}`;
    });
  }
</script>
<script src="/js/script.js" defer></script>
</body>
</html>
